name: Scanner

on:
  workflow_dispatch:

permissions:
  contents: write   # ✅ 允许写回仓库（关键）

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run scanner
        run: |
          chmod +x scamnet.sh
          ./scamnet.sh foreground

      # =========================
      # 写入 results.txt
      # =========================
      - name: Save results to file
        run: |
          if [[ -f socks5_connected.txt ]]; then
            cp socks5_connected.txt results.txt
          else
            echo "no results" > results.txt
          fi

      # =========================
      # 提交回仓库
      # =========================
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add results.txt

          git commit -m "update results [auto]" || echo "no changes"

          git push
